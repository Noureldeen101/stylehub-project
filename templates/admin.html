<h2>Admin Panel</h2>

<form action="/admin/add" method="POST">

    <input name="name" placeholder="Product Name"><br><br>

    <input name="category" placeholder="Category (men/women)"><br><br>

    <input name="price" placeholder="Price"><br><br>

    <input name="image" placeholder="Image (example: shirt.jpg)"><br><br>

    <input name="stock" placeholder="Stock"><br><br>

    <button type="submit">Add Product</button>

</form>

<h2>All Products</h2>

{% for product in products %}
<div style="border:1px solid black; margin:10px; padding:10px;">
    <h3>{{ product[1] }}</h3>
    <p>Price: {{ product[3] }}</p>
    <a href="/admin/delete/{{ product[0] }}">Delete</a>
<a href="/admin/edit/{{ product[0] }}">Edit</a>
</div>
{% endfor %}
